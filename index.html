<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>熊愛印標籤字體預視</title>
    <style>
        /* 1. 全數加上 ?v=final2026 標籤，這比清空快取更有效 */
        @font-face { font-family: '01'; src: url('./01.woff2?v=final2026') format('woff2'); font-display: block; }
        @font-face { font-family: '02'; src: url('./02.woff2?v=final2026') format('woff2'); font-display: block; }
        @font-face { font-family: '03'; src: url('./03.woff2?v=final2026') format('woff2'); font-display: block; }
        @font-face { font-family: '04'; src: url('./04.woff2?v=final2026') format('woff2'); font-display: block; }
        @font-face { font-family: '05'; src: url('./05.woff2?v=final2026') format('woff2'); font-display: block; }
        @font-face { font-family: '06'; src: url('./06.woff2?v=final2026') format('woff2'); font-display: block; }
        @font-face { font-family: '07'; src: url('./07.woff2?v=final2026') format('woff2'); font-display: block; }
        @font-face { font-family: '08'; src: url('./08.woff2?v=final2026') format('woff2'); font-display: block; }
        @font-face { font-family: '09'; src: url('./09.woff2?v=final2026') format('woff2'); font-display: block; }
        @font-face { font-family: '10'; src: url('./10.woff2?v=final2026') format('woff2'); font-display: block; }
        @font-face { font-family: '11'; src: url('./11.woff2?v=final2026') format('woff2'); font-display: block; }
        @font-face { font-family: '12'; src: url('./12.woff2?v=final2026') format('woff2'); font-display: block; }
        @font-face { font-family: '13'; src: url('./13.woff2?v=final2026') format('woff2'); font-display: block; }
        @font-face { font-family: '14'; src: url('./14.woff2?v=final2026') format('woff2'); font-display: block; }
        @font-face { font-family: '15'; src: url('./15.woff2?v=final2026') format('woff2'); font-display: block; }
        @font-face { font-family: '16'; src: url('./16.woff2?v=final2026') format('woff2'); font-display: block; }
        @font-face { font-family: '17'; src: url('./17.woff2?v=final2026') format('woff2'); font-display: block; }
        @font-face { font-family: '18'; src: url('./18.woff2?v=final2026') format('woff2'); font-display: block; }
        @font-face { font-family: '19'; src: url('./19.woff2?v=final2026') format('woff2'); font-display: block; }
        @font-face { font-family: '20'; src: url('./20.woff2?v=final2026') format('woff2'); font-display: block; }
        @font-face { font-family: '21'; src: url('./21.woff2?v=final2026') format('woff2'); font-display: block; }
        @font-face { font-family: '22'; src: url('./22.woff2?v=final2026') format('woff2'); font-display: block; }
        @font-face { font-family: '23'; src: url('./23.woff2?v=final2026') format('woff2'); font-display: block; }
        @font-face { font-family: '24'; src: url('./24.woff2?v=final2026') format('woff2'); font-display: block; }
        @font-face { font-family: '25'; src: url('./25.woff2?v=final2026') format('woff2'); font-display: block; }

        body { font-family: -apple-system, sans-serif; display: flex; justify-content: center; background: #f0f2f5; padding: 20px; }
        .container { width: 100%; max-width: 480px; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .logo { text-align: center; margin-bottom: 20px; }
        .logo img { max-width: 140px; }
        .label-preview { 
            width: 100%; height: 140px; border: 2.5px dashed #007AFF; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 38px; color: #222; margin-bottom: 25px; text-align: center;
        }
        select, input { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
    </style>
</head>
<body>
<div class="container">
    <div class="logo"><img src="https://cdn.store-assets.com/s/1179587/f/16931782.png"></div>
    <h2 style="text-align:center;">標籤字體預視</h2>
    
    <label>選擇字體：</label>
    <select id="fs">
        <option value="01">01 標楷體</option>
        <option value="02">02 中圓體</option>
        <option value="03">03 少女體</option>
        <option value="04">04 古印體</option>
        <option value="05">05 布丁體</option>
        <option value="06">06 行書體</option>
        <option value="07">07 娃娃體</option>
        <option value="08">08 流葉體</option>
        <option value="09">09 流隸體</option>
        <option value="10">10 童童體</option>
        <option value="11">11 海報體</option>
        <option value="12">12 堪亭體</option>
        <option value="13">13 新篆體</option>
        <option value="14">14 特明體</option>
        <option value="15">15 秀風體</option>
        <option value="16">16 翩翩體</option>
        <option value="17">17 POP體</option>
        <option value="18">18 墨字體</option>
        <option value="19">19 注音體</option>
        <option value="20">20 隸書體</option>
        <option value="21">21 皮皮體</option>
        <option value="22">22 兒風體</option>
        <option value="23">23 中黑體</option>
        <option value="24">24 寶風體</option>
        <option value="25">25 竹風體</option>
    </select>

    <div class="label-preview" id="pv">預覽文字</div>

    <label>輸入文字：</label>
    <input type="text" id="ui" placeholder="請在此輸入..." maxlength="20">
</div>

<script>
    const fs = document.getElementById('fs'), pv = document.getElementById('pv'), ui = document.getElementById('ui');
    function update() {
        pv.textContent = ui.value || "預覽文字";
        // 加上 !important 強迫 Chrome 執行
        pv.style.setProperty('font-family', `'${fs.value}', sans-serif`, 'important');
    }
    fs.addEventListener('change', update);
    ui.addEventListener('input', update);
    window.onload = update;
</script>
</body>
</html>    
    <div class="footer-note">
        <p>※ 效果僅供參考，實際以印刷成品為準。</p>
        <p>※ 選定後請告知編號，請勿僅提供截圖。</p>
    </div>

    <div class="order-links">
        <div><a href="https://shopee.tw/exprint" target="_blank">👉 點我前往「蝦皮」下單</a></div>
        <div><a href="https://www.syong-ai-yin.com/" target="_blank">👉 點我前往「官網」下單</a></div>
    </div>
</div>

<script>
    const fontSelect = document.getElementById('fontSelect');
    const previewBox = document.getElementById('previewBox');
    const userInput = document.getElementById('userInput');

    function updatePreview() {
        const selectedFont = fontSelect.value;
        previewBox.textContent = userInput.value || "預覽文字";
        // 加入 !important 與多層備援字體防止 Mac 渲染失敗
        previewBox.style.setProperty('font-family', `'${selectedFont}', "PingFang TC", "Microsoft JhengHei", sans-serif`, 'important');
    }

    userInput.addEventListener('input', updatePreview);
    fontSelect.addEventListener('change', updatePreview);

    // 初始載入與多重確保延遲 (對付 Mac 電腦載入大檔案的問題)
    window.onload = updatePreview;
    setTimeout(updatePreview, 500);
    setTimeout(updatePreview, 1500);
    setTimeout(updatePreview, 3000);
</script>

</body>
</html>
