<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>熊愛印標籤字體預視系統</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700&display=swap" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'BearFont';
            src: url('01.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 20px; background-color: #f8f9fa; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h2 { color: #333; text-align: center; margin-bottom: 25px; font-weight: 600; }
        label { display: block; margin-bottom: 8px; color: #666; font-size: 14px; }
        select, input { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 6px; font-size: 16px; box-sizing: border-box; }
        .label-preview {
            width: 100%; height: 140px; border: 2px dashed #007AFF; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 20px; background-color: #fff;
            font-family: 'Noto Serif TC', serif; font-size: 36px; color: #222;
            text-align: center; word-break: break-all; padding: 10px; box-sizing: border-box;
        }
    </style>
</head>
<body>

<div class="container">
    <div style="text-align: center; margin-bottom: 20px;">
        <img src="https://cdn.store-assets.com/s/1179587/f/16931782.png" alt="熊愛印 Logo" style="max-width: 150px; height: auto;">
    </div>
    <h2>標籤字體預視</h2>
    
    <label>選擇印刷字體：</label>
    <select id="fontSelect">
            <option value="'02', sans-serif">中圓體</option>
            <option value="'03', sans-serif">少女體</option>
            <option value="'04', sans-serif">古印體</option>
            <option value="'05', sans-serif">布丁體</option>
            <option value="'06', sans-serif">行書體</option>
            <option value="'07', sans-serif">娃娃體</option>
            <option value="'08', sans-serif">流葉體</option>
            <option value="'09', sans-serif">流隸體</option>
            <option value="'10', sans-serif">童童體(仿手寫字)</option>
            <option value="'11', sans-serif">海報體</option>
            <option value="'12', sans-serif">堪亭體</option>
            <option value="'13', sans-serif">新篆體</option>
            <option value="'14', sans-serif">特明體</option>
            <option value="'15', sans-serif">秀風體(仿手寫字)</option>
            <option value="'16', sans-serif">翩翩體(仿手寫字)</option>
            <option value="'17', sans-serif">POP體</option>
            <option value="'18', sans-serif">墨字體</option>
            <option value="'19', sans-serif">注音體(注意會有同字不同音</option>
            <option value="'20', sans-serif">隸書體</option>
            <option value="'21', sans-serif">皮皮體</option>
            <option value="'22', sans-serif">兒風體</option>
            <option value="'23', sans-serif">中黑體</option>
            <option value="'24', sans-serif">寶風體</option>
            <option value="'25', sans-serif">竹風體</option>
            <option value="'Comic Sans MS', 'Comic Sans', cursive">Comic Sans MS (不支援中文字)</option>
            <option value="Arial, Helvetica, sans-serif">Arial (不支援中文字)</option>
            <option value="'Times New Roman', Times, serif">Times New Roman (不支援中文字)</option>
            <option value="'Brush Script MT', cursive">Brush Script (不支援中文字)</option>
            <option value="'Snell Roundhand', 'Apple Chancery', cursive">Snell Roundhand (不支援中文字)</option>
        
    </select>

    <div class="label-preview" id="previewBox">預覽文字</div>

    <label>輸入標籤內容：</label>
    <input type="text" id="userInput" placeholder="請在此輸入文字..." maxlength="25">
    
    <div class="footer-note">
        <p>※ 此為數位模擬效果，實際印刷成品以校稿單為準。</p>
    </div>
    <p style="text-align:center; font-weight: bold;">
    滿意這個字體嗎？<br>
  <div style="text-align: center; margin-top: 20px; font-weight: bold; line-height: 2;">
    <div>
        <a href="https://shopee.tw/exprint" target="_blank" style="color: #aa7700; text-decoration: none;">👉 點我前往蝦皮「熊愛印」下單</a>
    </div>
    <div>
        <a href="https://www.syong-ai-yin.com/" target="_blank" style="color: #aa7700; text-decoration: none;">👉 點我前往官網「熊愛印」下單</a>
    </div>
</div>
    
</p>

<script>
    const fontSelect = document.getElementById('fontSelect');
    const previewBox = document.getElementById('previewBox');
    const userInput = document.getElementById('userInput');

    userInput.addEventListener('input', () => {
        previewBox.textContent = userInput.value.trim() || "預覽文字";
    });

    fontSelect.addEventListener('change', () => {
        previewBox.style.fontFamily = fontSelect.value;
    });
</script>

</body>
</html>
