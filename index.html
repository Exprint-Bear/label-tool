<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>熊愛印標籤字體預視系統</title>
    <style>
        /* 直接對齊你截圖中的檔名 */
        @font-face { font-family: '01'; src: url('./01.woff2') format('woff2'); font-display: swap; }
        @font-face { font-family: '02'; src: url('./02.woff2') format('woff2'); font-display: swap; }
        @font-face { font-family: '03'; src: url('./03.woff2') format('woff2'); font-display: swap; }
        @font-face { font-family: '04'; src: url('./04.woff2') format('woff2'); font-display: swap; }
        @font-face { font-family: '05'; src: url('./05.woff2') format('woff2'); font-display: swap; }
        @font-face { font-family: '06'; src: url('./06.woff2') format('woff2'); font-display: swap; }
        @font-face { font-family: '07'; src: url('./07.woff2') format('woff2'); font-display: swap; }
        @font-face { font-family: '08'; src: url('./08.woff2') format('woff2'); font-display: swap; }
        @font-face { font-family: '09'; src: url('./09.woff2') format('woff2'); font-display: swap; }
        @font-face { font-family: '10'; src: url('./10.woff2') format('woff2'); font-display: swap; }
        @font-face { font-family: '11'; src: url('./11.woff2') format('woff2'); font-display: swap; }
        @font-face { font-family: '12'; src: url('./12.woff2') format('woff2'); font-display: swap; }
        @font-face { font-family: '13'; src: url('./13.woff2') format('woff2'); font-display: swap; }
        @font-face { font-family: '14'; src: url('./14.woff2') format('woff2'); font-display: swap; }
        @font-face { font-family: '15'; src: url('./15.woff2') format('woff2'); font-display: swap; }
        @font-face { font-family: '16'; src: url('./16.woff2') format('woff2'); font-display: swap; }
        @font-face { font-family: '17'; src: url('./17.woff2') format('woff2'); font-display: swap; }
        @font-face { font-family: '18'; src: url('./18.woff2') format('woff2'); font-display: swap; }
        @font-face { font-family: '19'; src: url('./19.woff2') format('woff2'); font-display: swap; }
        @font-face { font-family: '20'; src: url('./20.woff2') format('woff2'); font-display: swap; }
        @font-face { font-family: '21'; src: url('./21.woff2') format('woff2'); font-display: swap; }
        @font-face { font-family: '22'; src: url('./22.woff2') format('woff2'); font-display: swap; }
        @font-face { font-family: '23'; src: url('./23.woff2') format('woff2'); font-display: swap; }
        @font-face { font-family: '24'; src: url('./24.woff2') format('woff2'); font-display: swap; }
        @font-face { font-family: '25'; src: url('./25.woff2') format('woff2'); font-display: swap; }

        body { font-family: -apple-system, sans-serif; display: flex; justify-content: center; background: #f8f9fa; padding: 20px; }
        .container { width: 100%; max-width: 450px; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; }
        select, input { width: 100%; padding: 12px; margin: 10px 0 20px; border-radius: 8px; border: 1px solid #ddd; font-size: 16px; box-sizing: border-box; }
        .label-preview {
            width: 100%; height: 120px; border: 2px dashed #007AFF; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 32px; text-align: center; margin-bottom: 20px;
        }
        .order-links { text-align: center; line-height: 2; font-weight: bold; }
        .order-links a { color: #aa7700; text-decoration: none; }
    </style>
</head>
<body>
<div class="container">
    <div style="text-align: center;"><img src="https://cdn.store-assets.com/s/1179587/f/16931782.png" style="max-width: 120px;"></div>
    <h2>字體預視</h2>
    <label>選擇字體：</label>
    <select id="fs">
        <option value="01">01 標楷體</option>
        <option value="13">13 新篆體</option>
        <option value="23">23 中黑體</option>
        </select>
    <div class="label-preview" id="pv">預覽文字</div>
    <label>輸入內容：</label>
    <input type="text" id="ui" placeholder="請輸入文字..." maxlength="20">
    <div class="order-links"><a href="https://shopee.tw/exprint" target="_blank">👉 前往蝦皮下單</a></div>
</div>
<script>
    const fs = document.getElementById('fs');
    const pv = document.getElementById('pv');
    const ui = document.getElementById('ui');
    function update() {
        pv.textContent = ui.value || "預覽文字";
        pv.style.fontFamily = `'${fs.value}', sans-serif`;
    }
    ui.addEventListener('input', update);
    fs.addEventListener('change', update);
    window.onload = update;
</script>
</body>
</html>
